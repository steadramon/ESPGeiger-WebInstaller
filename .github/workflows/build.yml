name: Build Installer

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to fetch (default: latest)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: installer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download webinstall payload from release
        uses: robinraju/release-downloader@v1.10
        id: releaseid
        with:
          repository: "steadramon/ESPGeiger"
          latest: ${{ github.event.inputs.tag == '' }}
          tag: ${{ github.event.inputs.tag }}
          fileName: "ESPGeiger_webinstall.*.zip"
          out-file-path: "downloaded"

      - name: Verify payload
        run: |
          ZIP=$(ls downloaded/ESPGeiger_webinstall.*.zip)
          python3 script/verify_payload.py "$ZIP"

      - name: Regenerate manifests from payload
        run: |
          TAG="${{ steps.releaseid.outputs.tag_name }}"
          VERSION="${TAG#v}"
          ZIP=$(ls downloaded/ESPGeiger_webinstall.*.zip)
          python3 script/sync_release.py "$VERSION" --zip "$ZIP"
          rm -rf downloaded

      - name: Substitute version tag in remaining placeholders
        run: |
          TAG="${{ steps.releaseid.outputs.tag_name }}"
          VERSION="${TAG#v}"
          # sync_release.py already renders manifests; this catches index.htm
          # plus any non-manifest spot that still uses {version}.
          sed -i "s#{version}#${VERSION}#g" index.htm

      - name: Force-update firmware branch in place
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Drop the workflow tree so the firmware branch isn't shadow-publishing
          # CI definitions, then orphan-commit the working tree as a single fresh
          # commit. Never `git push --delete firmware` - Pages drops its source
          # binding when the branch goes missing and then 404s after re-creation.
          rm -rf .github
          git checkout --orphan firmware-build
          git add -A
          git commit -m "Firmware built from ${{ steps.releaseid.outputs.tag_name }}"
          git push origin +HEAD:firmware
